services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-court}
      POSTGRES_PASSWORD: ${POSTRES_PASSWORD:-court}
      POSTGRES_DB: ${POSTGRES_DB:-court}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-court} -d ${POSTGRES_DB:-court}",
        ]
      interval: 3s
      timeout: 5s
      retries: 3
    ports:
      - "5432:5432"

  migrate:
    image: kukymbr/goose-docker:3.27.1
    environment:
      GOOSE_DRIVER: "postgres"
      GOOSE_DBSTRING: "host=db port=5432 user=${POSTGRES_USER:-court} password=${POSTGRES_PASSWORD:-court} dbname=${POSTGRES_DB:-court}"
    volumes:
      - ./migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
    restart: no
